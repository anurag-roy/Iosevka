# Generated from https://typeof.net/Iosevka/customizer
# This build plan contains multiple fonts, be careful not to
# overwrite multiple when changing the configuration of one.

# Zed Mono
# To build: npm run build -- ttf::ZedMono

[buildPlans.ZedMono]
family = "Zed Mono"
spacing = "fixed"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.ZedMono.variants]
inherits = "ss08"

[buildPlans.ZedMono.variants.design]
capital-n = "standard-serifless"
capital-w = "curly-serifless"
capital-x = "straight-serifless"
g = "double-storey"
x = "curly-serifless"
y = "straight-turn-serifless"
eszet = "sulzbacher-descending-serifless"
zero = "slashed"
four = "semi-open-serifless"
five = "upright-flat-serifless"
seven = "straight-serifed"
eight = "two-circles"
nine = "straight-bar"
asterisk = "penta-high"
underscore = "above-baseline"
caret = "medium"
paren = "normal"
brace = "curly"
number-sign = "slanted"
ampersand = "closed"
dollar = "open"
percent = "rings-continuous-slash"
bar = "force-upright"
question = "corner"

[buildPlans.ZedMono.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.ZedMono.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.ZedMono.widths.Normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.ZedMono.widths.SemiExtended]
shape = 548
menu = 6
css = "semi-expanded"

[buildPlans.ZedMono.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.ZedMono.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
